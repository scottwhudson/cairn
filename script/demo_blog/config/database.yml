# The demo blog gets its own Postgres database so it never touches the tracer's
# own dev DB. `config/boot.rb` creates the schema and seeds it on first run.
default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>

development:
  <<: *default
  database: tracer_demo_blog
