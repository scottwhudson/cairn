# Author-authored tour, shipped alongside the change. Imported into a Tour's
# waypoints by TourImporter. Lines refer to files relative to this directory.
title: "Fix: inclusive volume-discount tiers"
description: >
  Orders sitting exactly on a tier boundary (qty == 10 or qty == 100) were
  missing their discount. This tour steps through the corrected tier logic and
  shows the discount actually being applied to a boundary order.
waypoints:
  - file: pricing.rb
    line: 14
    change_kind: modified
    note: >
      The tier boundaries. Before the fix these used strict `>`, so a qty of
      exactly 10 or 100 fell through to the lower tier. Now they're inclusive
      `>=`. Watch `qty` here as the loop hits the boundary carts.
  - file: pricing.rb
    line: 16
    change_kind: modified
    note: >
      The medium-tier boundary specifically — qty == 10 now resolves to :medium
      instead of :small.
  - file: pricing.rb
    line: 28
    change_kind: modified
    note: >
      Where the tier rate turns into money. Inspect `rate`, `gross`, and
      `discount` — for a boundary cart `discount` is now non-zero.
